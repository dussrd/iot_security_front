<main class="login-shell">
  <section class="brand-panel" aria-label="Estado de plataforma">
    <div class="brand-mark">
      <span class="pi pi-shield"></span>
    </div>

    <div class="brand-text">
      <p class="eyebrow">IoT Security Console</p>
      <h1>Control inteligente de tu hogar</h1>
    </div>

    <div class="signal-grid" aria-hidden="true">
      <div class="signal-cell is-live">
        <span class="pi pi-wifi"></span>
        <strong>18</strong>
        <small>Nodos</small>
      </div>
      <div class="signal-cell">
        <span class="pi pi-chart-line"></span>
        <strong>342</strong>
        <small>Lecturas</small>
      </div>
      <div class="signal-cell is-warning">
        <span class="pi pi-bell"></span>
        <strong>7</strong>
        <small>Alertas</small>
      </div>
      <div class="signal-cell">
        <span class="pi pi-key"></span>
        <strong>RBAC</strong>
        <small>Roles</small>
      </div>
    </div>

    <div class="access-rule">
      <span class="pi pi-lock"></span>
      <div>
        <strong>Admin</strong>
        <span>GET, POST, PUT, PATCH, DELETE</span>
      </div>
      <div>
        <strong>Otros roles</strong>
        <span>Solo lectura</span>
      </div>
    </div>
  </section>

  <section class="auth-panel">
    <div class="auth-card">
      <div class="form-heading">
        <div class="form-icon-wrap">
          <span class="pi pi-sign-in"></span>
        </div>
        <div>
          <h2>Acceso IoT Security</h2>
          <p>Autenticacion por token Bearer</p>
        </div>
      </div>

      @if (error()) {
        <div class="alert">
          <span class="pi pi-exclamation-circle"></span>
          <p>{{ error() }}</p>
        </div>
      }

      <form (ngSubmit)="submit()" [formGroup]="loginForm">
        <label>
          <span>Usuario o correo</span>
          <input
            pInputText
            type="text"
            formControlName="identifier"
            autocomplete="username"
            placeholder="admin o admin@ejemplo.com"
          />
        </label>

        <label>
          <span>Contraseña</span>
          <p-password
            formControlName="password"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="w-full"
            autocomplete="current-password"
          />
        </label>

        <p-button
          type="submit"
          label="Iniciar sesion"
          icon="pi pi-arrow-right"
          iconPos="right"
          [loading]="loading()"
          class="w-full"
        />
      </form>
    </div>
  </section>
</main>
